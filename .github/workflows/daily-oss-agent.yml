name: Backlog Steward

on:
  schedule:
    - cron: "0 9 * * *"  # 9 AM UTC daily
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of PRs to process (default: 10)"
        required: false
        default: "10"
      dry_run:
        description: "Dry run (no writes)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

jobs:
  daily-batch:
    runs-on: ubuntu-latest  # GitHub-hosted runner (cloud)
    
    steps:
      - name: Checkout oss-tracker
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install opencode
        run: |
          echo "→ Installing opencode..."
          curl -fsSL https://opencode.ai/install | bash
          export PATH="$HOME/.opencode/bin:$PATH"
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH
          echo "✓ opencode installed"
          opencode --version

      - name: Configure opencode for Zen
        run: |
          echo "→ Configuring OpenCode Zen provider..."
          mkdir -p "$HOME/.config/opencode"
          cat > "$HOME/.config/opencode/opencode.json" << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "zen/big-pickle",
            "small_model": "zen/gpt-5-nano",
            "provider": {
              "zen": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "OpenCode Zen",
                "options": {
                  "baseURL": "https://opencode.ai/zen/v1"
                },
                "models": {
                  "big-pickle": {
                    "name": "Big Pickle",
                    "id": "big-pickle",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 200000,
                      "output": 65536
                    }
                  },
                  "deepseek-v4-flash-free": {
                    "name": "DeepSeek V4 Flash Free",
                    "id": "deepseek-v4-flash-free",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 200000,
                      "output": 65536
                    }
                  },
                  "gpt-5-nano": {
                    "name": "GPT 5 Nano",
                    "id": "gpt-5-nano",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 128000,
                      "output": 32768
                    }
                  },
                  "mimo-v2.5-free": {
                    "name": "MiMo V2.5 Free",
                    "id": "mimo-v2.5-free",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 200000,
                      "output": 65536
                    }
                  },
                  "qwen3.6-plus-free": {
                    "name": "Qwen3.6 Plus Free",
                    "id": "qwen3.6-plus-free",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 200000,
                      "output": 65536
                    }
                  }
                }
              }
            }
          }
          EOF
          echo "✓ Zen provider configured"

      - name: Verify tooling
        run: |
          echo "=== Tooling Check ==="
          which gh && gh --version | head -1
          which opencode && opencode --version | head -1
          which python3 && python3 --version
          which git && git --version | head -1
          echo "=== Environment ==="
          echo "HOME=$HOME"
          echo "PATH=$PATH"

      - name: Test opencode with Zen
        run: |
          echo "→ Testing opencode with Zen free tier..."
          opencode run --model zen/gpt-5-nano "Say 'Zen cloud test'" 2>&1 | head -10

      - name: Run daily batch
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '5' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PYTHONUNBUFFERED: "1"
        run: |
          chmod +x scripts/daily-batch.sh
          ./scripts/daily-batch.sh "$BATCH_SIZE" "$DRY_RUN"

      - name: Commit and push updates
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.email "64578610+Mr-Neutr0n@users.noreply.github.com"
          git config user.name "Mr-Neutr0n"
          
          # Set remote URL with PAT for push
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
          
          # Fetch latest first to check for remote changes
          echo "→ Fetching latest origin/main..."
          git fetch origin main
          
          # For progress.md (append-only), merge remote changes by taking both versions
          if [ -f .oss-harness/state/progress.md ]; then
            echo "→ Merging progress.md changes..."
            cp .oss-harness/state/progress.md /tmp/our_progress.md
            git show origin/main:.oss-harness/state/progress.md > .oss-harness/state/progress.md 2>/dev/null || true
            # Append lines from our version that don't exist in remote
            while IFS= read -r line; do
              if ! grep -Fxq "$line" .oss-harness/state/progress.md 2>/dev/null; then
                echo "$line" >> .oss-harness/state/progress.md
              fi
            done < /tmp/our_progress.md
            rm -f /tmp/our_progress.md
          fi
          
          # Add any updated state files
          git add -A .oss-harness/state/
          git add -A .oss-harness/reports/
          
          # Check what changed
          echo "=== Git status ==="
          git status --short
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "→ Committing changes..."
            git commit -m "automation: daily batch $(date -u +%Y-%m-%d)"
            echo "→ Pushing to main..."
            # Retry with rebase if push fails due to concurrent updates
            git push origin main || {
              echo "Push failed, retrying with rebase..."
              git fetch origin main
              git rebase origin/main || {
                echo "Rebase failed; aborting"
                git rebase --abort
                exit 1
              }
              git push origin main
            }
            echo "✓ Changes pushed"
          fi

      - name: Create summary issue (if failures)
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            -R "${{ github.repository }}" \
            -t "Daily batch failed: $(date -u +%Y-%m-%d)" \
            -b "The daily OSS agent workflow failed. Check the Actions logs for details."

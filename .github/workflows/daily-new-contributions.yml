name: Daily New Contributions

on:
  schedule:
    - cron: "30 5 * * *"  # 5:30 AM UTC = 11:00 AM IST
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Max PRs to open (default: 5)"
        required: false
        default: "5"
      dry_run:
        description: "Dry run (no writes)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

jobs:
  new-contributions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout oss-tracker
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install opencode
        run: |
          echo "Installing opencode..."
          curl -fsSL https://opencode.ai/install | bash
          export PATH="$HOME/.opencode/bin:$PATH"
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH
          opencode --version

      - name: Configure opencode for Zen
        run: |
          mkdir -p "$HOME/.config/opencode"
          cat > "$HOME/.config/opencode/opencode.json" << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "zen/big-pickle",
            "small_model": "zen/gpt-5-nano",
            "provider": {
              "zen": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "OpenCode Zen",
                "options": {
                  "baseURL": "https://opencode.ai/zen/v1"
                },
                "models": {
                  "big-pickle": {
                    "name": "Big Pickle",
                    "id": "big-pickle",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 200000,
                      "output": 65536
                    }
                  },
                  "gpt-5-nano": {
                    "name": "GPT 5 Nano",
                    "id": "gpt-5-nano",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 128000,
                      "output": 32768
                    }
                  }
                }
              }
            }
          }
          EOF

      - name: Verify tooling
        run: |
          echo "=== Tooling Check ==="
          which gh && gh --version | head -1
          which opencode && opencode --version | head -1
          which python3 && python3 --version
          which git && git --version | head -1

      - name: Run new contributor
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          chmod +x agent/new_contributor.py
          python3 agent/new_contributor.py \
            --max-prs ${{ github.event.inputs.max_prs || '5' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit and push updates
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.email "64578610+Mr-Neutr0n@users.noreply.github.com"
          git config user.name "Mr-Neutr0n"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
          git add -A .oss-harness/state/
          git add -A .oss-harness/reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "automation: daily new contributions $(date -u +%Y-%m-%d)"
            git push origin main
          fi

      - name: Create summary issue (if failures)
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            -R "${{ github.repository }}" \
            -t "New contributions failed: $(date -u +%Y-%m-%d)" \
            -b "The new contributions workflow failed. Check the Actions logs for details."

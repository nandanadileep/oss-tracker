name: Contribute

on:
  schedule:
    - cron: "41 4 * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Max PRs to open"
        default: "5"
      dry_run:
        description: "Dry run (no writes)"
        default: "false"
      force:
        description: "Ignore same-day re-run guard"
        default: "false"
      only:
        description: "Process exactly this candidate (owner/repo#N)"
        default: ""
      engine:
        description: "Patch engine (auto/sandbox/oneshot)"
        default: "auto"

permissions:
  contents: write
  issues: write

concurrency:
  group: oss-harness
  cancel-in-progress: false

jobs:
  contribute:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # target repos' test suites may need these (env-scrubbed when they run)
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install opencode (sandbox engine)
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH
          "$HOME/.opencode/bin/opencode" --version

      - name: Gateway probe
        run: |
          # quantify runner -> Zen gateway latency in the first seconds of every
          # run, so model slowness is never a mystery again. Informational only.
          for i in 1 2; do
            curl -m 30 -sS -o /dev/null \
              -w "gateway probe $i: HTTP %{http_code} connect=%{time_connect}s total=%{time_total}s\n" \
              -X POST https://opencode.ai/zen/v1/chat/completions \
              -H 'Content-Type: application/json' \
              -H 'User-Agent: oss-harness/0.4 (github.com/Mr-Neutr0n/oss-tracker)' \
              -d '{"model":"big-pickle","messages":[{"role":"user","content":"Reply OK"}],"max_tokens":5}' \
              || echo "gateway probe $i: FAILED"
          done

      - name: Run contributor
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python3 -m harness.apps.contribute \
            --max-prs "${{ github.event.inputs.max_prs || '5' }}" \
            --engine "${{ github.event.inputs.engine || 'auto' }}" \
            $([ "${{ github.event.inputs.dry_run }}" = "true" ] && echo --dry-run) \
            $([ "${{ github.event.inputs.force }}" = "true" ] && echo --force) \
            $([ -n "${{ github.event.inputs.only }}" ] && echo --only "${{ github.event.inputs.only }}")

      - name: Commit state
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: bash scripts/commit-state.sh contribute
